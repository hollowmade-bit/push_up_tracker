  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

r:#d8592f; margin-top:.5rem;\">Push-Up Tracker<\u002Fdiv>\n      <div style=\"font-family:'Oswald',sans-serif; font-weight:300; font-style:italic; font-size:.86rem; letter-spacing:.02em; color:#6b6560; margin-top:.7rem;\">Build the habit. One rep at a time.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- DAILY -->\n    <div style=\"text-align:center; padding-top:.4rem;\">\n      <div style=\"{{ numStyle }}\">{{ today }}<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:#6b6560; margin-top:.55rem;\">Built Today<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#8a8278; margin-top:1.15rem;\">{{ today }} / {{ dailyGoal }} daily goal<\u002Fdiv>\n      <div style=\"width:100%; height:6px; background:#1c1c1c; border-radius:3px; overflow:hidden; margin-top:.55rem;\"><div style=\"{{ dailyFillStyle }}\"><\u002Fdiv><\u002Fdiv>\n      <div style=\"font-family:'Oswald',sans-serif; font-weight:300; font-size:.98rem; letter-spacing:.04em; color:#cfc8be; margin-top:.95rem;\">{{ motiv }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ACTIONS -->\n    <div style=\"display:flex; flex-direction:column; gap:.65rem;\">\n      <button style=\"{{ logSetStyle }}\" style-active=\"background:#d8592f; color:#0d0d0d;\" onclick=\"{{ openEntry }}\">Log Set<\u002Fbutton>\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:.5rem;\">\n        <button style=\"font-family:'Oswald',sans-serif; font-weight:500; font-size:1.05rem; color:#cfc8be; background:transparent; border:1px solid #2a2a2a; border-radius:4px; padding:.85rem 0; cursor:pointer;\" style-active=\"background:#1a1a1a; border-color:#3a3a3a;\" onclick=\"{{ add5 }}\">+5<\u002Fbutton>\n        <button style=\"font-family:'Oswald',sans-serif; font-weight:500; font-size:1.05rem; color:#cfc8be; background:transparent; border:1px solid #2a2a2a; border-radius:4px; padding:.85rem 0; cursor:pointer;\" style-active=\"background:#1a1a1a; border-color:#3a3a3a;\" onclick=\"{{ add10 }}\">+10<\u002Fbutton>\n        <button style=\"font-family:'Oswald',sans-serif; font-weight:500; font-size:1.05rem; color:#cfc8be; background:transparent; border:1px solid #2a2a2a; border-radius:4px; padding:.85rem 0; cursor:pointer;\" style-active=\"background:#1a1a1a; border-color:#3a3a3a;\" onclick=\"{{ add15 }}\">+15<\u002Fbutton>\n        <button style=\"font-family:'Oswald',sans-serif; font-weight:500; font-size:1.05rem; color:#cfc8be; background:transparent; border:1px solid #2a2a2a; border-radius:4px; padding:.85rem 0; cursor:pointer;\" style-active=\"background:#1a1a1a; border-color:#3a3a3a;\" onclick=\"{{ add25 }}\">+25<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:.5rem; width:62%; margin:.15rem auto 0;\">\n        <button style=\"font-family:'Oswald',sans-serif; font-weight:500; font-size:.95rem; color:#7d766c; background:transparent; border:1px solid #222; border-radius:4px; padding:.65rem 0; cursor:pointer;\" style-active=\"background:#161616;\" onclick=\"{{ dec1 }}\">−1<\u002Fbutton>\n        <button style=\"font-family:'Oswald',sans-serif; font-weight:500; font-size:.95rem; color:#7d766c; background:transparent; border:1px solid #222; border-radius:4px; padding:.65rem 0; cursor:pointer;\" style-active=\"background:#161616;\" onclick=\"{{ inc1 }}\">+1<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- WEEKLY -->\n    <div style=\"background:#141414; border:1px solid #1f1f1f; border-radius:8px; padding:1.25rem 1.3rem;\">\n      <div style=\"display:flex; justify-content:space-between; align-items:baseline;\">\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.28em; text-transform:uppercase; color:#6b6560;\">This Week<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#8a8278;\">Goal {{ weeklyGoal }}<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:baseline; gap:.45rem; margin-top:.65rem;\">\n        <span style=\"font-family:'Oswald',sans-serif; font-weight:600; font-size:2.1rem; color:#e8e2d9; line-height:1;\">{{ weekTotal }}<\u002Fspan>\n        <span style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.1em; color:#6b6560;\">/ {{ weeklyGoal }} reps<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"width:100%; height:6px; background:#1c1c1c; border-radius:3px; overflow:hidden; margin-top:.75rem;\"><div style=\"{{ weekFillStyle }}\"><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- STREAK -->\n    <div style=\"background:#141414; border:1px solid #1f1f1f; border-radius:8px; padding:1.25rem 1.3rem;\">\n      <div style=\"display:flex; justify-content:space-between; align-items:flex-end;\">\n        <div>\n          <div style=\"display:flex; align-items:baseline; gap:.4rem;\">\n            <span style=\"font-family:'Oswald',sans-serif; font-weight:700; font-size:2.5rem; color:#d8592f; line-height:1;\">{{ streak }}<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.24em; text-transform:uppercase; color:#8a8278;\">Day Streak<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.05em; color:#6b6560; text-align:right; line-height:1.6;\">Don't break<br>the rebuild.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:.45rem; margin-top:1.2rem;\">\n        <sc-for list=\"{{ weekDays }}\" as=\"d\" hint-placeholder-count=\"7\">\n          <div style=\"flex:1; display:flex; flex-direction:column; align-items:center; gap:8px;\">\n            <div style=\"{{ d.dotStyle }}\"><\u002Fdiv>\n            <div style=\"{{ d.labelStyle }}\">{{ d.letter }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- HISTORY -->\n    <div style=\"background:#141414; border:1px solid #1f1f1f; border-radius:8px; padding:1.25rem 1.3rem;\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.28em; text-transform:uppercase; color:#6b6560;\">Recent Work<\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:.6rem; margin-top:1rem;\">\n        <sc-for list=\"{{ history }}\" as=\"h\" hint-placeholder-count=\"7\">\n          <div style=\"display:flex; align-items:center; gap:.75rem;\">\n            <span style=\"{{ h.labelStyle }}\">{{ h.label }}<\u002Fspan>\n            <div style=\"flex:1; height:6px; background:#1c1c1c; border-radius:3px; overflow:hidden;\"><div style=\"{{ h.fillStyle }}\"><\u002Fdiv><\u002Fdiv>\n            <span style=\"font-family:'Oswald',sans-serif; font-weight:500; font-size:.95rem; color:#cfc8be; min-width:32px; text-align:right;\">{{ h.count }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- LIFETIME -->\n    <div style=\"display:flex; justify-content:space-between; align-items:center; padding:0 .3rem;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:#5c574f;\">Lifetime Built<\u002Fspan>\n      <span style=\"font-family:'Oswald',sans-serif; font-weight:500; font-size:1rem; color:#8a8278;\">{{ lifetimeStr }} reps<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- RESET -->\n    <div style=\"text-align:center;\">\n      <span style=\"font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.1em; color:#403c36; cursor:pointer; text-decoration:underline; text-underline-offset:3px;\" onclick=\"{{ resetToday }}\">Reset today<\u002Fspan>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- LOG SET ENTRY OVERLAY -->\n<sc-if value=\"{{ entryOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed; inset:0; background:rgba(7,7,7,.84); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; z-index:50; padding:1.5rem;\" onclick=\"{{ closeEntry }}\">\n    <div style=\"width:100%; max-width:340px; background:#141414; border:1px solid #262626; border-radius:10px; padding:1.7rem 1.4rem 1.5rem; text-align:center;\" onclick=\"{{ stop }}\">\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.3em; text-transform:uppercase; color:#6b6560;\">Log a Set<\u002Fdiv>\n      <div style=\"font-family:'Oswald',sans-serif; font-weight:700; font-size:4.6rem; line-height:1; color:#d8592f; margin-top:.6rem;\">{{ entryVal }}<\u002Fdiv>\n      <div style=\"font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:#6b6560; margin-top:.2rem;\">reps<\u002Fdiv>\n      <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:.5rem; margin-top:1.4rem;\">\n        <button style=\"font-family:'Oswald',sans-serif; font-weight:500; font-size:1rem; color:#cfc8be; background:transparent; border:1px solid #2a2a2a; border-radius:4px; padding:.75rem 0; cursor:pointer;\" style-active=\"background:#1a1a1a;\" onclick=\"{{ entryDec5 }}\">−5<\u002Fbutton>\n        <button style=\"font-family:'Oswald',sans-serif; font-weight:500; font-size:1rem; color:#cfc8be; background:transparent; border:1px solid #2a2a2a; border-radius:4px; padding:.75rem 0; cursor:pointer;\" style-active=\"background:#1a1a1a;\" onclick=\"{{ entryDec1 }}\">−1<\u002Fbutton>\n        <button style=\"font-family:'Oswald',sans-serif; font-weight:500; font-size:1rem; color:#cfc8be; background:transparent; border:1px solid #2a2a2a; border-radius:4px; padding:.75rem 0; cursor:pointer;\" style-active=\"background:#1a1a1a;\" onclick=\"{{ entryInc1 }}\">+1<\u002Fbutton>\n        <button style=\"font-family:'Oswald',sans-serif; font-weight:500; font-size:1rem; color:#cfc8be; background:transparent; border:1px solid #2a2a2a; border-radius:4px; padding:.75rem 0; cursor:pointer;\" style-active=\"background:#1a1a1a;\" onclick=\"{{ entryInc5 }}\">+5<\u002Fbutton>\n      <\u002Fdiv>\n      <button style=\"width:100%; margin-top:.9rem; background:#d8592f; color:#0d0d0d; border:none; border-radius:4px; font-family:'Oswald',sans-serif; font-weight:600; font-size:1.1rem; letter-spacing:.18em; text-transform:uppercase; padding:1rem; cursor:pointer;\" style-active=\"background:#c24a23;\" onclick=\"{{ confirmEntry }}\">Add Set<\u002Fbutton>\n      <button style=\"width:100%; margin-top:.5rem; background:transparent; color:#6b6560; border:none; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.2em; text-transform:uppercase; padding:.5rem; cursor:pointer;\" onclick=\"{{ closeEntry }}\">Cancel<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;$preview&quot;: { &quot;width&quot;: 430, &quot;height&quot;: 980 },\n  &quot;dailyGoal&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 50, &quot;min&quot;: 10, &quot;max&quot;: 300, &quot;step&quot;: 5, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;weeklyGoal&quot;: { &quot;editor&quot;: &quot;int&quot;, &quot;default&quot;: 500, &quot;min&quot;: 50, &quot;max&quot;: 2000, &quot;step&quot;: 50, &quot;tsType&quot;: &quot;number&quot; },\n  &quot;accent&quot;: { &quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#d8592f&quot;, &quot;options&quot;: [&quot;#d8592f&quot;, &quot;#c2410c&quot;, &quot;#e0852f&quot;, &quot;#a23b2a&quot;], &quot;tsType&quot;: &quot;string&quot; }\n}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = { logs: [], bump: false, entryOpen: false, entryVal: 15 };\n  }\n\n  componentDidMount() {\n    let logs = null;\n    try { logs = JSON.parse(localStorage.getItem('hm-pushups') || 'null'); } catch (e) {}\n    if (!logs) logs = [];\n    this.setState({ logs });\n  }\n\n  ymd(d) {\n    const m = String(d.getMonth() + 1).padStart(2, '0');\n    const day = String(d.getDate()).padStart(2, '0');\n    return d.getFullYear() + '-' + m + '-' + day;\n  }\n\n  seed() {\n    const out = [];\n    const base = new Date();\n    const vals = [37, 28, 34, 42, 0];\n    for (let i = 0; i < 36; i++) {\n      const d = new Date(base); d.setDate(base.getDate() - i);\n      let c;\n      if (i < vals.length) c = vals[i];\n      else c = (i % 7 === 0) ? 0 : (30 + ((i * 13) % 25));\n      if (c > 0) out.push({ date: this.ymd(d), count: c });\n    }\n    return out;\n  }\n\n  persist(logs) {\n    try { localStorage.setItem('hm-pushups', JSON.stringify(logs)); } catch (e) {}\n  }\n\n  countFor(logs, ds) {\n    const e = logs.find(l => l.date === ds);\n    return e ? e.count : 0;\n  }\n\n  setToday(n) {\n    n = Math.max(0, Math.round(n));\n    const logs = this.state.logs.slice();\n    const t = this.ymd(new Date());\n    const i = logs.findIndex(l => l.date === t);\n    if (i >= 0) logs[i] = { date: t, count: n };\n    else logs.push({ date: t, count: n });\n    this.persist(logs);\n    this.setState({ logs });\n  }\n\n  add(n) {\n    const t = this.ymd(new Date());\n    const cur = this.countFor(this.state.logs, t);\n    this.setToday(cur + n);\n    this.setState({ bump: true });\n    clearTimeout(this._bt);\n    this._bt = setTimeout(() => this.setState({ bump: false }), 150);\n  }\n\n  renderVals() {\n    const logs = this.state.logs;\n    const A = this.props.accent ?? '#d8592f';\n    const dailyGoal = this.props.dailyGoal ?? 50;\n    const weeklyGoal = this.props.weeklyGoal ?? 500;\n    const now = new Date();\n    const today = this.countFor(logs, this.ymd(now));\n    const dpct = Math.min(100, dailyGoal > 0 ? (today / dailyGoal * 100) : 0);\n\n    let motiv;\n    if (today <= 0) motiv = 'Start the rebuild.';\n    else if (today >= dailyGoal) motiv = 'Goal earned.';\n    else if (today / dailyGoal >= 0.7) motiv = 'Almost there.';\n    else motiv = 'Keep stacking reps.';\n\n    // week (Sun-Sat)\n    const dow = now.getDay();\n    const start = new Date(now); start.setDate(now.getDate() - dow);\n    const LETTERS = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];\n    let weekTotal = 0;\n    const weekDays = [];\n    const todayStr = this.ymd(now);\n    for (let i = 0; i < 7; i++) {\n      const d = new Date(start); d.setDate(start.getDate() + i);\n      const ds = this.ymd(d);\n      const c = this.countFor(logs, ds);\n      weekTotal += c;\n      const isToday = ds === todayStr;\n      const isFuture = ds > todayStr;\n      const on = c > 0;\n      weekDays.push({\n        letter: LETTERS[i],\n        dotStyle: {\n          width: '100%', height: '8px', borderRadius: '4px',\n          background: on ? A : (isFuture ? '#171717' : '#272727'),\n          boxShadow: isToday ? ('0 0 0 1px ' + A + '66') : 'none',\n          transition: 'background .2s'\n        },\n        labelStyle: {\n          fontFamily: \"'JetBrains Mono',monospace\", fontSize: '9px',\n          letterSpacing: '.05em', color: isToday ? '#cfc8be' : '#5c574f'\n        }\n      });\n    }\n    const wpct = Math.min(100, weeklyGoal > 0 ? (weekTotal / weeklyGoal * 100) : 0);\n\n    // streak\n    let streak = 0;\n    {\n      let d = new Date(now);\n      if (this.countFor(logs, this.ymd(d)) <= 0) d.setDate(d.getDate() - 1);\n      while (this.countFor(logs, this.ymd(d)) > 0) { streak++; d.setDate(d.getDate() - 1); }\n    }\n\n    // history last 7\n    const ABBR = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];\n    const rows = [];\n    for (let i = 6; i >= 0; i--) {\n      const d = new Date(now); d.setDate(now.getDate() - i);\n      rows.push({ label: i === 0 ? 'Today' : ABBR[d.getDay()], count: this.countFor(logs, this.ymd(d)) });\n    }\n    const hmax = Math.max(1, ...rows.map(r => r.count));\n    const history = rows.map(r => ({\n      label: r.label,\n      count: r.count,\n      labelStyle: {\n        fontFamily: \"'JetBrains Mono',monospace\", fontSize: '11px', letterSpacing: '.04em',\n        minWidth: '46px', color: r.label === 'Today' ? '#cfc8be' : '#6b6560'\n      },\n      fillStyle: {\n        height: '100%', width: (r.count / hmax * 100) + '%',\n        background: r.count > 0 ? A : 'transparent', borderRadius: '3px', transition: 'width .3s'\n      }\n    }));\n\n    const lifetime = logs.reduce((s, l) => s + (l.count || 0), 0);\n\n    return {\n      today, dailyGoal, weeklyGoal, weekTotal, streak, motiv,\n      lifetimeStr: lifetime.toLocaleString(),\n      numStyle: {\n        fontFamily: \"'Oswald',sans-serif\", fontWeight: 700,\n        fontSize: 'clamp(5rem,30vw,7rem)', lineHeight: 0.95, color: A,\n        transform: this.state.bump ? 'scale(1.06)' : 'scale(1)',\n        transition: 'transform .14s cubic-bezier(.34,1.56,.64,1)', display: 'block'\n      },\n      dailyFillStyle: { height: '100%', width: dpct + '%', background: A, borderRadius: 'inherit', transition: 'width .35s ease' },\n      weekFillStyle: { height: '100%', width: wpct + '%', background: A, borderRadius: 'inherit', transition: 'width .35s ease' },\n      logSetStyle: {\n        width: '100%', background: 'transparent', border: '2px solid ' + A, color: A,\n        fontFamily: \"'Oswald',sans-serif\", fontWeight: 600, fontSize: '1.25rem',\n        letterSpacing: '.2em', padding: '1.15rem', borderRadius: '4px', cursor: 'pointer', textTransform: 'uppercase'\n      },\n      weekDays, history,\n      entryOpen: this.state.entryOpen, entryVal: this.state.entryVal,\n      add5: () => this.add(5), add10: () => this.add(10), add15: () => this.add(15), add25: () => this.add(25),\n      inc1: () => this.add(1), dec1: () => this.add(-1),\n      openEntry: () => this.setState({ entryOpen: true, entryVal: 15 }),\n      closeEntry: () => this.setState({ entryOpen: false }),\n      stop: (e) => { if (e && e.stopPropagation) e.stopPropagation(); },\n      entryDec1: () => this.setState(s => ({ entryVal: Math.max(1, s.entryVal - 1) })),\n      entryInc1: () => this.setState(s => ({ entryVal: Math.min(300, s.entryVal + 1) })),\n      entryDec5: () => this.setState(s => ({ entryVal: Math.max(1, s.entryVal - 5) })),\n      entryInc5: () => this.setState(s => ({ entryVal: Math.min(300, s.entryVal + 5) })),\n      confirmEntry: () => { const v = this.state.entryVal; this.setState({ entryOpen: false }); this.add(v); },\n      resetToday: () => { if (confirm('Reset today to 0?')) this.setToday(0); }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
